<body class="bg-[#0C0C0B] text-[#F7F7F7] font-sans antialiased min-h-screen overflow-hidden flex flex-col justify-center items-center">
<div class="noise-overlay"></div>
<!-- Background Subtle Branding -->
<div class="absolute top-12 left-1/2 -translate-x-1/2 opacity-20">
<span class="font-serif italic text-4xl tracking-tighter">VELA</span>
</div>
<!-- Main Content -->
<main class="z-10 w-full max-w-6xl px-8 flex flex-col items-center">
<header class="mb-16 text-center">
<h1 class="text-3xl font-light tracking-widest uppercase text-white/90">Who are you?</h1>
<div class="h-px w-12 bg-[#C8B89A]/30 mx-auto mt-6"></div>
</header>
<!-- Role Selector Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
<!-- DOCTOR CARD -->
<button class="group relative bg-white/5 border border-[#C8B89A]/40 p-12 flex flex-col items-center transition-all duration-300 hover:bg-white/10 text-center">
<div class="absolute top-4 right-4">
<span class="font-mono text-[10px] tracking-widest text-[#C8B89A] border border-[#C8B89A]/30 px-2 py-0.5">LEVEL 4</span>
</div>
<div class="mb-8 text-[#C8B89A]">
<span class="material-symbols-outlined text-5xl opacity-80 group-hover:scale-110 transition-transform duration-500" data-icon="medical_services">medical_services</span>
</div>
<h2 class="font-serif italic text-4xl mb-2">Doctor</h2>
<p class="font-sans text-xs uppercase tracking-[0.2em] text-white/40">Clinical Authority</p>
<div class="mt-8 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
<!-- RECEPTIONIST CARD -->
<button class="group relative bg-white/5 border border-white/10 p-12 flex flex-col items-center transition-all duration-300 hover:bg-white/10 text-center">
<div class="absolute top-4 right-4">
<span class="font-mono text-[10px] tracking-widest text-white/30 border border-white/10 px-2 py-0.5">LEVEL 2</span>
</div>
<div class="mb-8 text-white/60">
<span class="material-symbols-outlined text-5xl opacity-80 group-hover:scale-110 transition-transform duration-500" data-icon="desk">desk</span>
</div>
<h2 class="font-serif italic text-4xl mb-2">Receptionist</h2>
<p class="font-sans text-xs uppercase tracking-[0.2em] text-white/40">Operational Admin</p>
<div class="mt-8 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
<!-- PATIENT CARD -->
<button class="group relative bg-white/5 border border-white/10 p-12 flex flex-col items-center transition-all duration-300 hover:bg-white/10 text-center">
<div class="absolute top-4 right-4">
<span class="font-mono text-[10px] tracking-widest text-white/30 border border-white/10 px-2 py-0.5">LEVEL 1</span>
</div>
<div class="mb-8 text-white/60">
<span class="material-symbols-outlined text-5xl opacity-80 group-hover:scale-110 transition-transform duration-500" data-icon="person">person</span>
</div>

<p class="font-sans text-xs uppercase tracking-[0.2em] text-white/40">Personal Health</p>
<div class="mt-8 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</div>

<div class="flex items-center gap-2 mt-4">
<div class="h-1 w-1 rounded-full bg-white/20"></div>
<div class="h-1 w-1 rounded-full bg-white/20"></div>
<div class="h-1 w-1 rounded-full bg-white/20"></div>
</div>
</footer>
</main>
<!-- Atlas Orb: Sleeping Mode (Bottom NavBar semantic mapping) -->
<div class="fixed bottom-12 right-12 z-50 flex items-center justify-center">
<div class="relative group">
<!-- Pulsing Atmosphere -->
<div class="absolute inset-0 orb-glow scale-150 blur-xl opacity-50"></div>
<!-- Glassmorphism Container -->
<div class="relative w-16 h-16 rounded-full border border-white/10 backdrop-blur-2xl flex items-center justify-center overflow-hidden">
<!-- Inner Orb Core -->
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#C8B89A]/10 to-black border border-[#C8B89A]/20 flex items-center justify-center">
<span class="material-symbols-outlined text-[#C8B89A]/40 text-2xl" data-icon="mic">mic</span>
</div>
<!-- Scanning Line (Sleeping) -->
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-[#C8B89A]/20"></div>
</div>
<!-- Tooltip -->
<div class="absolute right-20 top-1/2 -translate-y-1/2 whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
<p class="font-mono text-[10px] tracking-[0.3em] uppercase text-[#C8B89A]">Atlas: Sleeping</p>
</div>
</div>
</div>

<div class="fixed bottom-8 left-12 flex items-center gap-4 opacity-30">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<span class="font-mono text-[9px] tracking-tighter">VELA-OS 2.4.0 ENCRYPTION ACTIVE</span>
